name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv sync --group docs

      - name: Deploy to GitHub Pages
        run: uv run --group docs mkdocs gh-deploy --force
