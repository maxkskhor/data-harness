[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dataact"
version = "0.1.0"
description = "Data agent with Python-native tools (no bash)"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "loguru",
    "pandas",
    "numpy",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "python-dotenv",
]

[tool.hatch.build.targets.wheel]
packages = ["dataact"]

[tool.uv]
dev-dependencies = [
    "pytest",
    "pytest-mock",
    "python-dotenv",
]

[tool.pytest.ini_options]
markers = [
    "live: smoke tests that call the real Anthropic API (deselect with -m 'not live')",
]
